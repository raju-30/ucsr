<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UCSR VAULT</title>

  <!-- CSS File -->
  <link rel="stylesheet" href="style.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
</head>

<body>

<main>
  <h1>UCSR VAULT</h1>

  <!-- Buttons -->
  <div id="BtnContainer">
    <span class="btn" onclick="filterSelection('certificates')">Certificates</span>
     <span class="btn" onclick="filterSelection('ImpDocuments')">Imp Documents</span>
     <span class="btn" onclick="filterSelection('Clg')">PDF</span>
  </div>

  <!-- Cards -->
  <div class="container">

    <div class="card filterDiv certificates">
      <h2>Course Certificates</h2>
      <a href="https://drive.google.com/drive/folders/1SHaSr5InSd2WrodKhUiGpnnb8M5WU6gQ?usp=drive_link" target="_blank">Open</a>
    </div>
    <div class="card filterDiv ImpDocuments">
      <h2>Imp certificates</h2>
      <a href="https://drive.google.com/drive/folders/1orpVHlqWhtlfesbyTg1HAoZhPEUbqAdF?usp=drive_link" target="_blank">Open</a>
    </div>
    <div class="card filterDiv Clg">
      <h2>Clg</h2>
      <a href="https://drive.google.com/drive/folders/1uPoee-oB-QZNPyNQBWP87of_qLUDo_z4?usp=drive_link" target="_blank">Open</a>
    </div>


  </div>
  <!-- Password Popup -->
<div id="passwordModal" class="modal">
  <div class="modal-box">
    <h3>This is locked!!<h3>
    <p>Enter password</p>

    <input type="password" id="passwordInput" placeholder="Password">

    <div class="modal-actions">
      <button onclick="checkPassword()">Unlock</button>
      <button onclick="closeModal()">Cancel</button>
    </div>

    <p id="errorMsg"></p>
  </div>
</div>
</main>


<!-- JS File -->
<script src="script.js"></script>

</body>
</html>
